# Code Review Agent configuration
# Copy to config.yaml and adjust

rules:
  max_line_length: 120
  disallow_todo_without_ticket: true
  disallow_trailing_whitespace: false
  disallow_tab_indentation: false
  enforce_file_length: false
  max_file_lines: 1500
  disallow_merge_conflict_markers: false
  require_newline_at_eof: false
  disallow_potential_secrets: false
  disallow_debug_statements: false

paths:
  include:
    - "**/*.py"
    - "**/*.js"
    - "**/*.ts"
    - "**/*.java"
  exclude:
    - "**/node_modules/**"
    - "**/vendor/**"
    - "**/.git/**"
    - "**/build/**"
    - "**/dist/**"

output:
  format: text  # text | json
  fail_on_issues: true
